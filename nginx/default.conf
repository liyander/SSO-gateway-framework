server {
    listen 443 ssl;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $keycloak_upstream keycloak:8080;
    set $oauth2_proxy_upstream oauth2-proxy:4180;
    set $admin_panel_upstream admin-panel:3000;
    set $gateway_proxy_upstream gateway-proxy:4000;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    client_max_body_size 50m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    location /auth/ {
        proxy_pass http://$keycloak_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /keycloak-ready {
        proxy_pass http://keycloak:8080/auth/realms/platform/.well-known/openid-configuration;
        proxy_http_version 1.1;
    }

    location /realms/ {
        rewrite ^/realms/(.*)$ /auth/realms/$1 break;
        proxy_pass http://$keycloak_upstream;
        proxy_http_version 1.1;
    }

    location /resources/ {
        rewrite ^/resources/(.*)$ /auth/resources/$1 break;
        proxy_pass http://$keycloak_upstream;
        proxy_http_version 1.1;
    }

    location /admin/ {
        rewrite ^/admin/(.*)$ /auth/admin/$1 break;
        proxy_pass http://$keycloak_upstream;
        proxy_http_version 1.1;
    }

    location /oauth2/ {
        proxy_pass http://$oauth2_proxy_upstream;
        proxy_set_header X-Auth-Request-Redirect $scheme://$host$request_uri;
        proxy_set_header X-Forwarded-Host $host;
    }

    location = /oauth2/auth {
        internal;
        proxy_pass http://$oauth2_proxy_upstream/oauth2/auth;
        proxy_set_header Content-Length "";
        proxy_pass_request_body off;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Uri $request_uri;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /platform-admin {
        return 302 /platform-admin/login;
    }

    location = /admin-panel {
        return 302 /platform-admin/login;
    }

    location = /admin-panel/ {
        return 302 /platform-admin/;
    }

    location = /platform-admin/ {
        proxy_pass http://$admin_panel_upstream/platform-admin/;
        proxy_http_version 1.1;
        proxy_set_header X-Platform-Surface admin;
    }

    location = /platform-admin/login {
        proxy_pass http://$admin_panel_upstream/platform-admin/login;
        proxy_http_version 1.1;
        proxy_set_header X-Platform-Surface admin;
    }

    location = /platform-admin/logout {
        proxy_pass http://$admin_panel_upstream/platform-admin/logout;
        proxy_http_version 1.1;
        proxy_set_header X-Platform-Surface admin;
    }

    location /platform-admin/apps {
        proxy_pass http://$admin_panel_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header X-Platform-Surface admin;
    }

    location /platform-admin/audit {
        proxy_pass http://$admin_panel_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header X-Platform-Surface admin;
    }

    location /assets/ {
        proxy_pass http://$admin_panel_upstream/assets/;
        proxy_http_version 1.1;
    }

    location /api/ {
        proxy_pass http://$admin_panel_upstream/api/;
        proxy_http_version 1.1;
    }

    location /app/ {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/start?rd=$scheme://$host$request_uri;
        error_page 500 502 503 504 = /auth-unavailable;

        auth_request_set $user $upstream_http_x_auth_request_user;
        auth_request_set $email $upstream_http_x_auth_request_email;
        auth_request_set $groups $upstream_http_x_auth_request_groups;
        auth_request_set $access_token $upstream_http_x_auth_request_access_token;

        proxy_set_header X-Auth-Request-User $user;
        proxy_set_header X-Auth-Request-Email $email;
        proxy_set_header X-Auth-Request-Groups $groups;
        proxy_set_header X-Auth-Request-Access-Token $access_token;
        proxy_set_header Authorization "Bearer $access_token";

        proxy_pass http://$gateway_proxy_upstream/app/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /target-status/ {
        proxy_pass http://$gateway_proxy_upstream/targets/;
        proxy_http_version 1.1;
    }

    location /health {
        access_log off;
        return 200 "ok\n";
    }

    location = /status {
        proxy_pass http://$admin_panel_upstream/status;
        proxy_http_version 1.1;
    }

    location = / {
        proxy_set_header X-Platform-Surface landing;
        proxy_pass http://$admin_panel_upstream/landing;
        proxy_http_version 1.1;
    }

    location /portal {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/start?rd=$scheme://$host$request_uri;
        error_page 500 502 503 504 = /auth-unavailable;

        auth_request_set $user $upstream_http_x_auth_request_user;
        auth_request_set $email $upstream_http_x_auth_request_email;
        auth_request_set $groups $upstream_http_x_auth_request_groups;
        auth_request_set $access_token $upstream_http_x_auth_request_access_token;

        proxy_set_header X-Auth-Request-User $user;
        proxy_set_header X-Auth-Request-Email $email;
        proxy_set_header X-Auth-Request-Groups $groups;
        proxy_set_header X-Auth-Request-Access-Token $access_token;
        proxy_set_header Authorization "Bearer $access_token";

        proxy_pass http://$admin_panel_upstream/portal;
        proxy_http_version 1.1;
    }

    location = /auth-unavailable {
        internal;
        proxy_pass http://$admin_panel_upstream/auth-unavailable;
        proxy_http_version 1.1;
    }
}
